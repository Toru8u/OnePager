<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Status</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --surface-color: #2a2a3f;
            --text-main: #cdd6f4;
            --text-muted: #a6adc8;
            --accent: #89b4fa;
            --success: #a6e3a1;
            --error: #f38ba8;
            --border: #45475a;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            margin: 0;
            line-height: 1.5;
        }

        .container {
            background-color: var(--surface-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h2 { margin-top: 0; color: var(--accent); }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        input {
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        button {
            background-color: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: var(--border); cursor: not-allowed; }

        #result {
            display: none;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .icon {
            width: 64px;
            height: 64px;
            image-rendering: pixelated;
            border-radius: 4px;
            background: var(--bg-color);
        }

        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-online { background: rgba(166, 227, 161, 0.2); color: var(--success); }
        .status-offline { background: rgba(243, 139, 168, 0.2); color: var(--error); }

        .data-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.5rem 1rem;
            font-size: 0.9rem;
        }
        .label { color: var(--text-muted); }
        
        .code-block {
            background: var(--bg-color);
            padding: 0.5rem;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            margin: 0;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Minecraft Server Scanner</h2>
    <div class="form-group">
        <label for="serverIp">URL oder IP (mit oder ohne Port)</label>
        <input type="text" id="serverIp" placeholder="z.B. mc.hypixel.net oder 85.12.34.56:25565">
        <button id="fetchBtn" onclick="getServerStatus()">Abfragen</button>
    </div>

    <div id="result">
        <!-- Resultat wird per JS hier injiziert -->
    </div>
</div>

<script>
    async function getServerStatus() {
        const inputStr = document.getElementById('serverIp').value.trim();
        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('fetchBtn');

        if (!inputStr) return;

        // UI Loading State
        btn.disabled = true;
        btn.innerText = "Lade...";
        resultDiv.style.display = "block";
        resultDiv.innerHTML = '<span class="label">Frage API ab...</span>';

        try {
            /* 
               Workaround: Da der Browser (JavaScript) aus Sicherheitsgründen keine rohen 
               TCP/UDP Sockets öffnen darf, müssen wir eine HTTP-Proxy-API nutzen. 
               Hier wird die offene API von mcsrvstat.us verwendet.
            */
            const response = await fetch(`https://api.mcsrvstat.us/3/${encodeURIComponent(inputStr)}`);
            
            if (!response.ok) {
                throw new Error(`Netzwerkfehler: ${response.status}`);
            }

            const data = await response.json();

            if (data.online) {
                const motdClean = data.motd?.clean?.join('<br>') || 'Keine MOTD';
                const iconBase64 = data.icon || 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2NCIgaGVpZ2h0PSI2NCIgZmlsbD0iIzQ1NDc1YSI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIvPjwvc3ZnPg=='; // Grauer Platzhalter

                resultDiv.innerHTML = `
                    <div class="header-info">
                        <img src="${iconBase64}" class="icon" alt="Server Icon">
                        <div>
                            <span class="status-badge status-online">Online</span>
                            <h3 style="margin: 0.5rem 0 0 0;">${data.hostname || data.ip}</h3>
                        </div>
                    </div>
                    <div class="data-grid">
                        <span class="label">Version:</span> <span>${data.version}</span>
                        <span class="label">Spieler:</span> <span>${data.players?.online || 0} / ${data.players?.max || 0}</span>
                        <span class="label">Software:</span> <span>${data.software || 'Vanilla/Unbekannt'}</span>
                        <span class="label">MOTD:</span> <span>${motdClean}</span>
                        <span class="label">Latenz:</span> <span>${data.debug?.ping ? 'Aktiv' : 'Unbekannt'}</span>
                    </div>
                    ${data.players?.list ? `
                        <div style="margin-top: 1rem;">
                            <span class="label">Online Spieler:</span>
                            <div class="code-block">${data.players.list.map(p => p.name).join(', ')}</div>
                        </div>
                    ` : ''}
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="header-info">
                        <span class="status-badge status-offline">Offline</span>
                        <h3 style="margin: 0;">Ziel nicht erreichbar</h3>
                    </div>
                    <p class="label" style="font-size: 0.9rem;">
                        Entweder ist der Server offline, der Port falsch, oder es handelt sich um eine lokale IP-Adresse (192.168.x.x), die von der externen API nicht erreicht werden kann.
                    </p>
                `;
            }

        } catch (error) {
            resultDiv.innerHTML = `
                <span class="status-badge status-offline">Fehler</span>
                <p style="color: var(--error); margin-top: 0.5rem;">${error.message}</p>
            `;
            console.error("Abfrage fehlgeschlagen:", error);
        } finally {
            // UI Reset
            btn.disabled = false;
            btn.innerText = "Abfragen";
        }
    }
</script>

</body>
</html>
