<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Strip Cutter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..600&display=swap" rel="stylesheet">
<style>
/* Art direction: utility tool → clean, dense, functional. Nexus palette. */
:root, [data-theme="light"] {
  --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9;
  --color-surface-offset: #f3f0ec; --color-surface-dynamic: #e6e4df;
  --color-divider: #dcd9d5; --color-border: #d4d1ca;
  --color-text: #28251d; --color-text-muted: #7a7974; --color-text-faint: #bab9b4;
  --color-text-inverse: #f9f8f4;
  --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-active: #0f3638;
  --color-primary-highlight: #cedcd8;
  --color-success: #437a22; --color-error: #a12c7b;
  --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06); --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --font-body: 'Inter', sans-serif;
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
}
[data-theme="dark"] {
  --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
  --color-surface-offset: #1d1c1a; --color-surface-dynamic: #2d2c2a;
  --color-divider: #262523; --color-border: #393836;
  --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
  --color-text-inverse: #2b2a28;
  --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-active: #1a626b;
  --color-primary-highlight: #313b3b;
  --color-success: #6daa45; --color-error: #d163a7;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2); --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
}
@media (prefers-color-scheme: dark) { :root:not([data-theme]) {
  --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
  --color-surface-offset: #1d1c1a; --color-surface-dynamic: #2d2c2a;
  --color-divider: #262523; --color-border: #393836;
  --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
  --color-text-inverse: #2b2a28;
  --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-active: #1a626b;
  --color-primary-highlight: #313b3b;
  --color-success: #6daa45; --color-error: #d163a7;
}}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
body { min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-sm);
  color: var(--color-text); background: var(--color-bg); display: flex; flex-direction: column; }
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit;
  transition: color var(--transition), background var(--transition), box-shadow var(--transition); }

/* Header */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-3) var(--space-6);
  border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface);
}
.logo { display: flex; align-items: center; gap: var(--space-2); font-weight: 600; font-size: var(--text-base); }
.logo svg { color: var(--color-primary); }
.theme-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md); color: var(--color-text-muted); }
.theme-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }

/* Layout */
main { flex: 1; display: grid; grid-template-columns: 320px 1fr; gap: 0; min-height: 0; }
.sidebar {
  padding: var(--space-6);
  border-right: 1px solid var(--color-divider);
  background: var(--color-surface);
  display: flex; flex-direction: column; gap: var(--space-5);
  overflow-y: auto;
}
.canvas-area {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: var(--space-6); background: var(--color-bg); gap: var(--space-4);
  overflow: auto;
}

/* Drop zone */
.dropzone {
  border: 2px dashed var(--color-border); border-radius: var(--radius-lg);
  padding: var(--space-8) var(--space-6); text-align: center;
  cursor: pointer; transition: border-color var(--transition), background var(--transition);
  color: var(--color-text-muted);
}
.dropzone:hover, .dropzone.dragover { border-color: var(--color-primary); background: color-mix(in oklch, var(--color-primary) 5%, var(--color-surface)); }
.dropzone svg { margin: 0 auto var(--space-3); color: var(--color-text-faint); }
.dropzone p { font-size: var(--text-xs); }
.dropzone strong { display: block; font-size: var(--text-sm); color: var(--color-text); margin-bottom: var(--space-1); }

/* Section */
.section-label { font-size: var(--text-xs); font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--color-text-muted); margin-bottom: var(--space-2); }
.divider { height: 1px; background: var(--color-divider); }

/* Mode toggle */
.mode-toggle { display: flex; gap: var(--space-2); }
.mode-btn { flex: 1; padding: var(--space-2) var(--space-3); border-radius: var(--radius-md);
  border: 1px solid var(--color-border); font-size: var(--text-xs); font-weight: 500;
  color: var(--color-text-muted); background: var(--color-surface-offset); }
.mode-btn.active { background: var(--color-primary); color: var(--color-text-inverse);
  border-color: var(--color-primary); }
.mode-btn:hover:not(.active) { background: var(--color-surface-dynamic); color: var(--color-text); }

/* Coord display */
.coord-box { background: var(--color-surface-offset); border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4); font-size: var(--text-xs); font-variant-numeric: tabular-nums; }
.coord-row { display: flex; justify-content: space-between; align-items: center;
  padding: var(--space-1) 0; }
.coord-row + .coord-row { border-top: 1px solid var(--color-divider); }
.coord-label { color: var(--color-text-muted); }
.coord-value { font-weight: 600; color: var(--color-text); }
.coord-value.set { color: var(--color-primary); }

/* Instruction */
.hint { font-size: var(--text-xs); color: var(--color-text-muted); line-height: 1.5; }
.hint strong { color: var(--color-text); }

/* Buttons */
.btn-primary { width: 100%; padding: var(--space-3) var(--space-4); border-radius: var(--radius-md);
  background: var(--color-primary); color: var(--color-text-inverse);
  font-size: var(--text-sm); font-weight: 500; }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-primary:active { background: var(--color-primary-active); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { width: 100%; padding: var(--space-2) var(--space-4); border-radius: var(--radius-md);
  border: 1px solid var(--color-border); font-size: var(--text-xs); color: var(--color-text-muted); }
.btn-secondary:hover { background: var(--color-surface-offset); color: var(--color-text); }

/* Format selector */
.format-row { display: flex; gap: var(--space-2); align-items: center; }
.format-row label { font-size: var(--text-xs); color: var(--color-text-muted); flex-shrink: 0; }
select { flex: 1; padding: var(--space-1) var(--space-2); border-radius: var(--radius-sm);
  border: 1px solid var(--color-border); background: var(--color-surface-2);
  color: var(--color-text); font-size: var(--text-xs); font-family: var(--font-body); }

/* Canvas wrapper */
.canvas-wrapper { position: relative; display: inline-block; box-shadow: var(--shadow-lg);
  border-radius: var(--radius-md); overflow: hidden; cursor: crosshair; }
#mainCanvas { display: block; max-width: 100%; }
.canvas-info { font-size: var(--text-xs); color: var(--color-text-muted); }

/* Empty state */
.empty-state { display: flex; flex-direction: column; align-items: center; gap: var(--space-3);
  color: var(--color-text-faint); text-align: center; }
.empty-state p { font-size: var(--text-sm); color: var(--color-text-muted); }

/* Status badge */
.status { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-faint); }
.status-dot.ready { background: var(--color-success); }
.status-dot.selecting { background: var(--color-primary); }

@media (max-width: 768px) {
  main { grid-template-columns: 1fr; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--color-divider); }
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-label="Image Strip Cutter">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="3" y1="9" x2="21" y2="9" stroke-dasharray="3 1"/>
      <line x1="3" y1="15" x2="21" y2="15"/>
      <path d="M3 15 L21 15" stroke-width="2.5"/>
    </svg>
    Strip Cutter
  </div>
  <button class="theme-btn" data-theme-toggle aria-label="Theme wechseln">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  </button>
</header>

<main>
  <aside class="sidebar">
    <!-- Drop zone -->
    <div>
      <div class="section-label">Bild laden</div>
      <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Bild per Drag & Drop laden">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <strong>Datei hier ablegen</strong>
        <p>oder klicken zum Auswählen<br>PNG, JPG, WebP, GIF</p>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <div class="divider"></div>

    <!-- Mode -->
    <div>
      <div class="section-label">Schnittrichtung</div>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="horizontal" id="btnH">↕ Horizontal</button>
        <button class="mode-btn" data-mode="vertical" id="btnV">↔ Vertikal</button>
      </div>
    </div>

    <!-- Coords -->
    <div>
      <div class="section-label">Grenzen</div>
      <div class="coord-box">
        <div class="coord-row">
          <span class="coord-label" id="label1">Obere Grenze (Top)</span>
          <span class="coord-value" id="val1">—</span>
        </div>
        <div class="coord-row">
          <span class="coord-label" id="label2">Untere Grenze (Bottom)</span>
          <span class="coord-value" id="val2">—</span>
        </div>
      </div>
      <div style="margin-top: var(--space-2)">
        <div class="status">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText" style="color: var(--color-text-muted)">Kein Bild geladen</span>
        </div>
      </div>
    </div>

    <!-- Hint -->
    <div class="hint" id="hintBox">
      Lade zuerst ein Bild.
    </div>

    <div class="divider"></div>

    <!-- Format & Download -->
    <div>
      <div class="section-label">Ausgabe</div>
      <div class="format-row" style="margin-bottom: var(--space-3)">
        <label for="formatSelect">Format</label>
        <select id="formatSelect">
          <option value="png">PNG (verlustfrei)</option>
          <option value="jpg">JPEG</option>
          <option value="webp">WebP</option>
        </select>
      </div>
      <button class="btn-primary" id="btnCut" disabled>Streifen entfernen &amp; speichern</button>
    </div>

    <button class="btn-secondary" id="btnReset" style="display:none">Zurücksetzen</button>
  </aside>

  <section class="canvas-area" id="canvasArea">
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <p>Bild laden und dann<br>zwei Linien im Bild setzen</p>
    </div>
    <div class="canvas-wrapper" id="canvasWrapper" style="display:none">
      <canvas id="mainCanvas"></canvas>
    </div>
    <div class="canvas-info" id="canvasInfo" style="display:none"></div>
  </section>
</main>

<script>
(function(){
  // Theme toggle
  const themeBtn = document.querySelector('[data-theme-toggle]');
  const root = document.documentElement;
  let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  root.setAttribute('data-theme', theme);
  themeBtn.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', theme);
  });

  // State
  let img = null, imgW = 0, imgH = 0;
  let mode = 'horizontal'; // horizontal = top/bottom lines, vertical = left/right
  let line1 = null, line2 = null; // pixel coords on original image
  let dragging = false;

  // Elements
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  const canvasWrapper = document.getElementById('canvasWrapper');
  const emptyState = document.getElementById('emptyState');
  const canvasInfo = document.getElementById('canvasInfo');
  const btnCut = document.getElementById('btnCut');
  const btnReset = document.getElementById('btnReset');
  const val1 = document.getElementById('val1');
  const val2 = document.getElementById('val2');
  const label1 = document.getElementById('label1');
  const label2 = document.getElementById('label2');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const hintBox = document.getElementById('hintBox');
  const formatSelect = document.getElementById('formatSelect');
  const btnH = document.getElementById('btnH');
  const btnV = document.getElementById('btnV');

  // Scale: canvas display vs actual image pixels
  let scale = 1;

  function setMode(m) {
    mode = m;
    line1 = null; line2 = null;
    btnH.classList.toggle('active', m === 'horizontal');
    btnV.classList.toggle('active', m === 'vertical');
    updateLabels();
    if (img) { redraw(); updateUI(); }
  }

  btnH.addEventListener('click', () => setMode('horizontal'));
  btnV.addEventListener('click', () => setMode('vertical'));

  function updateLabels() {
    if (mode === 'horizontal') {
      label1.textContent = 'Obere Grenze (Top)';
      label2.textContent = 'Untere Grenze (Bottom)';
    } else {
      label1.textContent = 'Linke Grenze (Left)';
      label2.textContent = 'Rechte Grenze (Right)';
    }
  }

  // File load
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(f);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  function loadFile(file) {
    const url = URL.createObjectURL(file);
    const image = new Image();
    image.onload = () => {
      img = image; imgW = image.naturalWidth; imgH = image.naturalHeight;
      line1 = null; line2 = null;
      layoutCanvas();
      emptyState.style.display = 'none';
      canvasWrapper.style.display = 'inline-block';
      canvasInfo.style.display = 'block';
      btnReset.style.display = 'block';
      updateUI();
      redraw();
    };
    image.src = url;
  }

  function layoutCanvas() {
    const maxW = canvasWrapper.parentElement.clientWidth - 48;
    const maxH = window.innerHeight - 160;
    scale = Math.min(1, maxW / imgW, maxH / imgH);
    canvas.width = Math.round(imgW * scale);
    canvas.height = Math.round(imgH * scale);
  }

  function redraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    // Draw cut zone overlay
    if (line1 !== null && line2 !== null) {
      const a = Math.min(line1, line2) * scale;
      const b = Math.max(line1, line2) * scale;
      if (mode === 'horizontal') {
        ctx.fillStyle = 'rgba(255,60,60,0.18)';
        ctx.fillRect(0, a, canvas.width, b - a);
      } else {
        ctx.fillStyle = 'rgba(255,60,60,0.18)';
        ctx.fillRect(a, 0, b - a, canvas.height);
      }
    }

    // Draw lines
    [line1, line2].forEach((l, i) => {
      if (l === null) return;
      const pos = l * scale;
      ctx.save();
      ctx.strokeStyle = i === 0 ? '#01696f' : '#e05050';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 3]);
      ctx.beginPath();
      if (mode === 'horizontal') {
        ctx.moveTo(0, pos); ctx.lineTo(canvas.width, pos);
      } else {
        ctx.moveTo(pos, 0); ctx.lineTo(pos, canvas.height);
      }
      ctx.stroke();
      ctx.restore();

      // Label
      ctx.save();
      ctx.fillStyle = i === 0 ? '#01696f' : '#e05050';
      ctx.font = 'bold 11px Inter, sans-serif';
      const lbl = i === 0 ? (mode === 'horizontal' ? `Top: ${l}px` : `Left: ${l}px`)
                           : (mode === 'horizontal' ? `Bottom: ${l}px` : `Right: ${l}px`);
      if (mode === 'horizontal') {
        ctx.fillText(lbl, 6, Math.max(pos - 4, 14));
      } else {
        ctx.save();
        ctx.translate(pos + 4, 14);
        ctx.fillText(lbl, 0, 0);
        ctx.restore();
      }
      ctx.restore();
    });

    // Image info
    const removed = (line1 !== null && line2 !== null)
      ? Math.abs(line2 - line1) : 0;
    const dimAfter = mode === 'horizontal'
      ? `${imgW} × ${imgH - removed}`
      : `${imgW - removed} × ${imgH}`;
    canvasInfo.textContent = `Original: ${imgW} × ${imgH}px`
      + (removed ? `  →  Nach Schnitt: ${dimAfter}px  (${removed}px entfernt)` : '');
  }

  function getImgCoord(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const cy = (e.clientY - rect.top) * (canvas.height / rect.height);
    if (mode === 'horizontal') return Math.round(cy / scale);
    return Math.round(cx / scale);
  }

  canvas.addEventListener('mousedown', e => {
    if (!img) return;
    const coord = getImgCoord(e);
    if (line1 === null || (line2 !== null)) {
      // Start fresh if both set
      if (line2 !== null) { line1 = null; line2 = null; }
      line1 = coord;
      dragging = true;
    }
    redraw(); updateUI();
  });

  canvas.addEventListener('mousemove', e => {
    if (!img || !dragging) return;
    line2 = getImgCoord(e);
    redraw(); updateUI();
  });

  canvas.addEventListener('mouseup', e => {
    if (!img || !dragging) return;
    line2 = getImgCoord(e);
    dragging = false;
    // Ensure line1 < line2 semantically
    if (line1 > line2) [line1, line2] = [line2, line1];
    redraw(); updateUI();
  });

  canvas.addEventListener('mouseleave', () => {
    if (dragging && line2 !== null) {
      dragging = false;
      if (line1 > line2) [line1, line2] = [line2, line1];
      redraw(); updateUI();
    }
  });

  // Touch support
  function getTouchCoord(e) {
    const t = e.touches[0] || e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    const cx = (t.clientX - rect.left) * (canvas.width / rect.width);
    const cy = (t.clientY - rect.top) * (canvas.height / rect.height);
    if (mode === 'horizontal') return Math.round(cy / scale);
    return Math.round(cx / scale);
  }
  canvas.addEventListener('touchstart', e => { e.preventDefault(); if (!img) return;
    if (line2 !== null) { line1 = null; line2 = null; }
    line1 = getTouchCoord(e); dragging = true; redraw(); updateUI(); }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!dragging) return;
    line2 = getTouchCoord(e); redraw(); updateUI(); }, {passive:false});
  canvas.addEventListener('touchend', e => { e.preventDefault(); if (!dragging) return;
    line2 = getTouchCoord(e); dragging = false;
    if (line1 > line2) [line1, line2] = [line2, line1];
    redraw(); updateUI(); }, {passive:false});

  function updateUI() {
    val1.textContent = line1 !== null ? `${line1}px` : '—';
    val1.className = 'coord-value' + (line1 !== null ? ' set' : '');
    val2.textContent = line2 !== null ? `${line2}px` : '—';
    val2.className = 'coord-value' + (line2 !== null ? ' set' : '');

    const ready = line1 !== null && line2 !== null && !dragging;
    btnCut.disabled = !ready;

    if (!img) {
      statusDot.className = 'status-dot';
      statusText.textContent = 'Kein Bild geladen';
      hintBox.innerHTML = 'Lade zuerst ein Bild.';
    } else if (line1 === null) {
      statusDot.className = 'status-dot selecting';
      statusText.textContent = 'Erste Linie setzen';
      hintBox.innerHTML = mode === 'horizontal'
        ? '<strong>Klick + Ziehen</strong> im Bild: von der oberen zur unteren Grenze des zu entfernenden Streifens ziehen.'
        : '<strong>Klick + Ziehen</strong> im Bild: von der linken zur rechten Grenze des zu entfernenden Streifens ziehen.';
    } else if (line2 === null || dragging) {
      statusDot.className = 'status-dot selecting';
      statusText.textContent = 'Zweite Linie ziehen…';
      hintBox.innerHTML = 'Maustaste gedrückt halten und zur zweiten Grenze ziehen.';
    } else {
      statusDot.className = 'status-dot ready';
      statusText.textContent = 'Bereit zum Schneiden';
      const removed = Math.abs(line2 - line1);
      hintBox.innerHTML = `<strong>${removed}px</strong> werden entfernt. Klick ins Bild zum Neusetzen.`;
    }
  }

  // Cut & download
  btnCut.addEventListener('click', () => {
    if (!img || line1 === null || line2 === null) return;
    const a = Math.min(line1, line2);
    const b = Math.max(line1, line2);

    const offscreen = document.createElement('canvas');
    const octx = offscreen.getContext('2d');

    if (mode === 'horizontal') {
      offscreen.width = imgW;
      offscreen.height = imgH - (b - a);
      octx.drawImage(img, 0, 0, imgW, a, 0, 0, imgW, a);
      octx.drawImage(img, 0, b, imgW, imgH - b, 0, a, imgW, imgH - b);
    } else {
      offscreen.width = imgW - (b - a);
      offscreen.height = imgH;
      octx.drawImage(img, 0, 0, a, imgH, 0, 0, a, imgH);
      octx.drawImage(img, b, 0, imgW - b, imgH, a, 0, imgW - b, imgH);
    }

    const fmt = formatSelect.value;
    const mime = fmt === 'jpg' ? 'image/jpeg' : fmt === 'webp' ? 'image/webp' : 'image/png';
    const quality = fmt === 'jpg' ? 0.92 : undefined;

    offscreen.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `cut_result.${fmt}`;
      link.click();
      URL.revokeObjectURL(url);
    }, mime, quality);
  });

  btnReset.addEventListener('click', () => {
    img = null; line1 = null; line2 = null;
    canvas.width = 0; canvas.height = 0;
    emptyState.style.display = 'flex';
    canvasWrapper.style.display = 'none';
    canvasInfo.style.display = 'none';
    btnReset.style.display = 'none';
    fileInput.value = '';
    updateUI();
  });

  updateLabels();
  updateUI();

  window.addEventListener('resize', () => { if (img) { layoutCanvas(); redraw(); } });
})();
</script>
</body>
</html>
